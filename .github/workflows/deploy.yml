name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 22 * * *' # 매일 아침 한국시간 7시 (UTC 22시)
  workflow_dispatch: # 수동 실행을 위한 설정

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 모든 기록을 가져와야 자동 커밋 시 충돌 방지

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run automation scripts
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/fetch-public-data.js
          node scripts/fetch-geoje-events.js
          node scripts/fetch-rss-events.js
          node scripts/update-restaurant-ranking.js
          node scripts/generate-blog-post.js

      - name: Commit and push changes
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 변경사항이 있는 경우에만 커밋 수행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Build project
        env:
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_COUPANG_PARTNER_ID: ${{ secrets.NEXT_PUBLIC_COUPANG_PARTNER_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=chamnongkkun-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
